<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analytics — Bitvavo Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    body { background: #f1f5f9; color: #1e293b; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #1e293b; }
    .navbar { background: #1e40af !important; border-bottom: none; }
    .stat-label { font-size: .75rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { font-size: 1.45rem; font-weight: 700; }
    .pos { color: #16a34a; } .neg { color: #dc2626; }
    table { font-size: .83rem; }
    thead th { color: #475569; font-weight: 500; border-color: #e2e8f0; background: #f8fafc; }
    tbody td { border-color: #e2e8f0; vertical-align: middle; }
    tbody tr:hover td { background: #f8fafc; }
    .form-select { background: #ffffff; border-color: #cbd5e1; color: #1e293b; }
    .form-select:focus { background: #ffffff; border-color: #3b82f6; color: #1e293b; box-shadow: none; }
    option { background: #ffffff; }
    .empty-state { color: #64748b; font-size: .9rem; }
    @media (max-width:576px) { .hide-sm { display:none; } }
  </style>
<script>const BASE_URL = '{{ url_for("index") }}'.replace(//$/, '');</script>
</head>
<body>

<nav class="navbar navbar-dark px-3 mb-4">
  <a class="navbar-brand fw-bold text-decoration-none" href="{{ url_for('index') }}">← Dashboard</a>
  <span style="font-size:.85rem; color:#93c5fd;">Performance Analytics</span>
</nav>

<div class="container-fluid px-3 pb-5" style="max-width:960px;">

  <!-- Markt filter -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <label class="text-muted small mb-0">Markt:</label>
    <select class="form-select form-select-sm" id="mkt-select" style="max-width:180px;" onchange="loadAnalytics()">
      <option value="">Alle markten</option>
      {% for m in markets %}
      <option value="{{ m }}">{{ m }}</option>
      {% endfor %}
    </select>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadAnalytics()">⟳ Verversen</button>
  </div>

  <!-- KPI kaartjes -->
  <div class="row g-3 mb-4" id="kpi-row">
    <div class="col-6 col-md-3"><div class="card p-3 text-center">
      <div class="stat-label">Totaal PnL</div>
      <div class="stat-value" id="v-total-pnl">—</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center">
      <div class="stat-label">Win rate</div>
      <div class="stat-value" id="v-winrate">—</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center">
      <div class="stat-label">Trades</div>
      <div class="stat-value" id="v-trades">—</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center">
      <div class="stat-label">Gem. winst</div>
      <div class="stat-value pos" id="v-avg-win">—</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center">
      <div class="stat-label">Gem. verlies</div>
      <div class="stat-value neg" id="v-avg-loss">—</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center">
      <div class="stat-label">Beste trade</div>
      <div class="stat-value pos" id="v-best">—</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center">
      <div class="stat-label">Slechtste trade</div>
      <div class="stat-value neg" id="v-worst">—</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center">
      <div class="stat-label">Winst / Verlies</div>
      <div class="stat-value" id="v-wl">—</div>
    </div></div>
  </div>

  <!-- Cumulatieve PnL curve -->
  <div class="card mb-4">
    <div class="card-header">Cumulatieve PnL (per afgesloten trade)</div>
    <div class="card-body"><canvas id="equity-chart" height="100"></canvas></div>
  </div>

  <!-- Dagelijkse PnL staafdiagram -->
  <div class="card mb-4">
    <div class="card-header">Dagelijkse PnL</div>
    <div class="card-body"><canvas id="daily-chart" height="90"></canvas></div>
  </div>

  <!-- Trades tabel -->
  <div class="card mb-4">
    <div class="card-header" id="pairs-header">Afgesloten trades</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Verkoop</th>
              <th class="hide-sm">Markt</th>
              <th class="text-end hide-sm">Koop prijs</th>
              <th class="text-end hide-sm">Verkoop prijs</th>
              <th class="text-end">PnL EUR</th>
              <th class="text-end">PnL %</th>
            </tr>
          </thead>
          <tbody id="pairs-tbody">
            <tr><td colspan="6" class="text-center empty-state py-4">Laden...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  let equityChart = null;
  let dailyChart  = null;

  async function loadAnalytics() {
    const mkt = document.getElementById('mkt-select').value;
    const url = BASE_URL + '/api/analytics' + (mkt ? '?market=' + mkt : '');
    try {
      const r = await fetch(url);
      const d = await r.json();
      if (d.error) { alert('Fout: ' + d.error); return; }
      renderKpis(d);
      renderEquityChart(d.equity);
      renderDailyChart(d.daily);
      renderPairs(d.pairs);
    } catch(e) {
      alert('Fout bij laden analytics: ' + e.message);
    }
  }

  function renderKpis(d) {
    const pos = d.total_pnl >= 0;
    setVal('v-total-pnl', fmt(d.total_pnl, true) + ' EUR', pos ? 'pos' : 'neg');
    const wrCls = d.win_rate_pct >= 50 ? 'pos' : 'neg';
    setVal('v-winrate', d.win_rate_pct.toFixed(1) + '%', wrCls);
    setVal('v-trades', d.num_trades, '');
    setVal('v-avg-win', fmt(d.avg_win_eur, true) + ' EUR', 'pos');
    setVal('v-avg-loss', fmt(d.avg_loss_eur, true) + ' EUR', 'neg');
    setVal('v-best', fmt(d.best_trade, true) + ' EUR', 'pos');
    setVal('v-worst', fmt(d.worst_trade, true) + ' EUR', 'neg');
    setVal('v-wl', d.num_wins + 'W / ' + d.num_losses + 'L', '');
  }

  function setVal(id, text, cls) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'stat-value ' + (cls || '');
  }

  function fmt(v, sign) {
    return (sign && v > 0 ? '+' : '') + v.toFixed(2);
  }

  function renderEquityChart(equity) {
    if (equityChart) equityChart.destroy();
    if (!equity.length) return;
    const labels = equity.map(e => e.ts);
    const vals   = equity.map(e => e.cum_pnl);
    const final  = vals[vals.length - 1];
    equityChart = new Chart(document.getElementById('equity-chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Cumulatieve PnL (EUR)',
          data: vals,
          borderColor: final >= 0 ? '#16a34a' : '#dc2626',
          backgroundColor: final >= 0 ? 'rgba(22,163,74,.08)' : 'rgba(220,38,38,.08)',
          borderWidth: 1.5,
          pointRadius: 2,
          fill: true,
          tension: 0.2,
        }, {
          label: 'Break-even',
          data: Array(vals.length).fill(0),
          borderColor: '#94a3b8',
          borderWidth: 1,
          borderDash: [4, 3],
          pointRadius: 0,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#64748b', font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: '#64748b', maxTicksLimit: 10, font: { size: 10 } }, grid: { color: '#e2e8f0' } },
          y: { ticks: { color: '#64748b', font: { size: 10 }, callback: v => '€' + v.toFixed(2) }, grid: { color: '#e2e8f0' } }
        }
      }
    });
  }

  function renderDailyChart(daily) {
    if (dailyChart) dailyChart.destroy();
    if (!daily.length) return;
    const labels = daily.map(d => d.date);
    const vals   = daily.map(d => d.pnl);
    const colors = vals.map(v => v >= 0 ? 'rgba(22,163,74,.7)' : 'rgba(220,38,38,.7)');
    dailyChart = new Chart(document.getElementById('daily-chart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{ label: 'Dagelijkse PnL (EUR)', data: vals, backgroundColor: colors, borderRadius: 3 }]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#64748b', font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: '#64748b', maxTicksLimit: 14, font: { size: 10 } }, grid: { color: '#e2e8f0' } },
          y: { ticks: { color: '#64748b', font: { size: 10 }, callback: v => '€' + v.toFixed(2) }, grid: { color: '#e2e8f0' } }
        }
      }
    });
  }

  function renderPairs(pairs) {
    document.getElementById('pairs-header').textContent = 'Afgesloten trades (' + pairs.length + ')';
    const tbody = document.getElementById('pairs-tbody');
    if (!pairs.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center empty-state py-4">Geen afgesloten trades gevonden.</td></tr>';
      return;
    }
    tbody.innerHTML = pairs.slice().reverse().map(p => {
      const cls = p.pnl_eur >= 0 ? 'pos' : 'neg';
      return `<tr>
        <td class="font-monospace" style="font-size:.78rem;">${p.sell_ts.slice(0,16)}</td>
        <td class="hide-sm fw-semibold">${p.market}</td>
        <td class="text-end hide-sm">€${p.buy_price.toFixed(4)}</td>
        <td class="text-end hide-sm">€${p.sell_price.toFixed(4)}</td>
        <td class="text-end ${cls} fw-semibold">${p.pnl_eur >= 0 ? '+' : ''}€${p.pnl_eur.toFixed(2)}</td>
        <td class="text-end ${cls}">${p.pnl_pct >= 0 ? '+' : ''}${p.pnl_pct.toFixed(2)}%</td>
      </tr>`;
    }).join('');
  }

  // Laad direct bij pagina open
  loadAnalytics();
</script>
</body>
</html>
