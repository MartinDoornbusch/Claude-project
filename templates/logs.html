<!DOCTYPE html>
<html lang="nl" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logboek — Bitvavo Trading Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --surface-1: rgba(13, 20, 36, 0.9);
  --surface-2: rgba(30, 41, 59, 0.6);
  --border: rgba(148, 163, 184, 0.1);
  --accent: #f59e0b;
}

html { color-scheme: dark; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #060b16;
  background-image:
    radial-gradient(ellipse at 18% 45%, rgba(99,102,241,.07) 0%, transparent 55%),
    radial-gradient(ellipse at 82% 18%, rgba(16,185,129,.04) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 95%, rgba(245,158,11,.03) 0%, transparent 40%);
  background-attachment: fixed;
  color: #cbd5e1;
  min-height: 100vh;
}

.card {
  background: rgba(13, 20, 36, 0.88);
  border: 1px solid rgba(148,163,184,.1);
  border-radius: 14px !important;
  box-shadow: 0 4px 32px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.04) inset;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.card-header {
  background: rgba(30,41,59,.5) !important;
  border-bottom: 1px solid rgba(148,163,184,.1) !important;
  font-weight: 600;
  color: #e2e8f0;
  border-radius: 14px 14px 0 0 !important;
}

.navbar {
  background: linear-gradient(180deg, rgba(6,11,22,.98) 0%, rgba(9,15,30,.95) 100%) !important;
  border-bottom: 1px solid rgba(99,102,241,.22) !important;
  box-shadow: 0 2px 24px rgba(0,0,0,.5) !important;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding-top: 10px;
  padding-bottom: 10px;
}

.btn-outline-light     { border-color: rgba(148,163,184,.3) !important; color: #94a3b8 !important; }
.btn-outline-light:hover{ background: rgba(148,163,184,.1) !important; color: #e2e8f0 !important; }
.btn-outline-secondary { border-color: rgba(148,163,184,.2) !important; color: #94a3b8 !important; }
.btn-outline-secondary:hover { background: rgba(148,163,184,.1) !important; color: #e2e8f0 !important; }
.btn-outline-danger  { border-color: rgba(244,63,94,.4) !important; color: #f43f5e !important; }
.btn-outline-danger:hover  { background: rgba(244,63,94,.14) !important; }
.btn-outline-primary { border-color: rgba(99,102,241,.4) !important; color: #818cf8 !important; }
.btn-outline-primary:hover { background: rgba(99,102,241,.14) !important; }
.btn-outline-warning { border-color: rgba(245,158,11,.4) !important; color: #f59e0b !important; }
.btn-outline-warning:hover { background: rgba(245,158,11,.12) !important; }

.text-muted { color: #64748b !important; }
a { color: #818cf8; }
a:hover { color: #c7d2fe; }

hr { border-color: rgba(148,163,184,.1); }

.log-row { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size:.82rem; border-bottom:1px solid rgba(148,163,184,.06); padding:4px 8px; white-space:pre-wrap; word-break:break-word; }
.log-row.WARNING  { background:rgba(245,158,11,.07); color:#fcd34d; }
.log-row.ERROR    { background:rgba(244,63,94,.07);  color:#fca5a5; }
.log-row.CRITICAL { background:rgba(244,63,94,.12);  color:#fca5a5; font-weight:700; }
.log-row.DEBUG    { color: #475569; }
.log-row.INFO     { color: #94a3b8; }
.badge-INFO     { background:rgba(99,102,241,.15); color:#818cf8; }
.badge-WARNING  { background:rgba(245,158,11,.15); color:#f59e0b; }
.badge-ERROR    { background:rgba(244,63,94,.15);  color:#f43f5e; }
.badge-CRITICAL { background:rgba(244,63,94,.25);  color:#f43f5e; }
.badge-DEBUG    { background:rgba(100,116,139,.12); color:#64748b; }
#log-container { max-height: 75vh; overflow-y: auto; }
.filter-btn.active { font-weight:700; box-shadow:inset 0 0 0 2px currentColor; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(148,163,184,.2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,.35); }
  </style>
  <script>const BASE_URL = '{{ url_for("index") }}'.replace(/\/$/, '');</script>
</head>
<body>

<nav class="navbar navbar-dark px-3 mb-4">
  <a class="btn btn-sm btn-outline-light fw-semibold px-3" href="{{ url_for('index') }}">‹ Dashboard</a>
  <span style="font-size:.85rem; color:#93c5fd;">Logboek</span>
  <a href="{{ url_for('settings_page') }}" class="btn btn-sm btn-outline-light">⚙ Instellingen</a>
</nav>

<div class="container-fluid px-3 pb-5" style="max-width:1100px;">
  <div class="card">
    <div class="card-header d-flex flex-wrap align-items-center gap-2 justify-content-between">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-sm btn-outline-secondary filter-btn active" onclick="setFilter('ALL', this)">Alles</button>
        <button class="btn btn-sm btn-outline-warning filter-btn" onclick="setFilter('WARNING', this)">⚠ Waarschuwingen</button>
        <button class="btn btn-sm btn-outline-danger filter-btn" onclick="setFilter('ERROR', this)">✕ Fouten</button>
        <button class="btn btn-sm btn-outline-secondary filter-btn" onclick="setFilter('INFO', this)">ℹ Info</button>
        <button class="btn btn-sm btn-outline-secondary filter-btn" onclick="setFilter('DEBUG', this)">🔍 Debug</button>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="text-muted" style="font-size:.8rem;" id="log-count"></span>
        <button class="btn btn-sm btn-outline-primary" onclick="loadLogs()">↻ Vernieuwen</button>
      </div>
    </div>
    <div id="log-container">
      <div id="log-body"></div>
    </div>
  </div>
</div>

<script>
  let _activeFilter = 'ALL';

  function setFilter(level, btn) {
    _activeFilter = level;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadLogs();
  }

  async function loadLogs() {
    const body  = document.getElementById('log-body');
    const count = document.getElementById('log-count');
    try {
      const r = await fetch(BASE_URL + '/api/logs?level=' + _activeFilter);
      const d = await r.json();
      const logs = d.logs || [];
      count.textContent = logs.length + ' regels';
      if (!logs.length) {
        body.innerHTML = '<div class="text-muted p-3">Geen logregels gevonden.</div>';
        return;
      }
      body.innerHTML = logs.map(e => {
        const lvl = e.level || 'INFO';
        return `<div class="log-row ${lvl}"><span class="badge ${'badge-'+lvl} me-2">${lvl}</span><span class="text-muted me-2">${e.ts}</span><strong>${e.name}</strong> — ${escHtml(e.message)}</div>`;
      }).join('');
    } catch(err) {
      body.innerHTML = `<div class="alert alert-danger m-3">Fout bij laden: ${err.message}</div>`;
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadLogs();
  setInterval(loadLogs, 15000);
</script>
</body>
</html>
