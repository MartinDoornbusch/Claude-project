<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logboek — Bitvavo Trading Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f1f5f9; color: #1e293b; }
    .navbar { background: #1e40af !important; }
    .card { background: #fff; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
    .log-row { font-family: monospace; font-size: .82rem; border-bottom: 1px solid #f1f5f9; padding: 3px 6px; white-space: pre-wrap; word-break: break-word; }
    .log-row.WARNING  { background: #fffbeb; color: #92400e; }
    .log-row.ERROR    { background: #fef2f2; color: #991b1b; }
    .log-row.CRITICAL { background: #fef2f2; color: #7f1d1d; font-weight: 700; }
    .log-row.DEBUG    { color: #94a3b8; }
    .log-row.INFO     { color: #1e293b; }
    .badge-INFO     { background:#e0f2fe; color:#0369a1; }
    .badge-WARNING  { background:#fef3c7; color:#92400e; }
    .badge-ERROR    { background:#fee2e2; color:#991b1b; }
    .badge-CRITICAL { background:#fecaca; color:#7f1d1d; }
    .badge-DEBUG    { background:#f1f5f9; color:#64748b; }
    #log-container { max-height: 75vh; overflow-y: auto; }
    .filter-btn.active { font-weight: 700; box-shadow: inset 0 0 0 2px currentColor; }
  </style>
  <script>const BASE_URL = '{{ url_for("index") }}'.replace(/\/$/, '');</script>
</head>
<body>

<nav class="navbar navbar-dark px-3 mb-4">
  <a class="btn btn-sm btn-outline-light fw-semibold px-3" href="{{ url_for('index') }}">‹ Dashboard</a>
  <span style="font-size:.85rem; color:#93c5fd;">Logboek</span>
  <a href="{{ url_for('settings_page') }}" class="btn btn-sm btn-outline-light">⚙ Instellingen</a>
</nav>

<div class="container-fluid px-3 pb-5" style="max-width:1100px;">
  <div class="card">
    <div class="card-header d-flex flex-wrap align-items-center gap-2 justify-content-between">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-sm btn-outline-secondary filter-btn active" onclick="setFilter('ALL', this)">Alles</button>
        <button class="btn btn-sm btn-outline-warning filter-btn" onclick="setFilter('WARNING', this)">⚠ Waarschuwingen</button>
        <button class="btn btn-sm btn-outline-danger filter-btn" onclick="setFilter('ERROR', this)">✕ Fouten</button>
        <button class="btn btn-sm btn-outline-secondary filter-btn" onclick="setFilter('INFO', this)">ℹ Info</button>
        <button class="btn btn-sm btn-outline-secondary filter-btn" onclick="setFilter('DEBUG', this)">🔍 Debug</button>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="text-muted" style="font-size:.8rem;" id="log-count"></span>
        <button class="btn btn-sm btn-outline-primary" onclick="loadLogs()">↻ Vernieuwen</button>
      </div>
    </div>
    <div id="log-container">
      <div id="log-body"></div>
    </div>
  </div>
</div>

<script>
  let _activeFilter = 'ALL';

  function setFilter(level, btn) {
    _activeFilter = level;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadLogs();
  }

  async function loadLogs() {
    const body  = document.getElementById('log-body');
    const count = document.getElementById('log-count');
    try {
      const r = await fetch(BASE_URL + '/api/logs?level=' + _activeFilter);
      const d = await r.json();
      const logs = d.logs || [];
      count.textContent = logs.length + ' regels';
      if (!logs.length) {
        body.innerHTML = '<div class="text-muted p-3">Geen logregels gevonden.</div>';
        return;
      }
      body.innerHTML = logs.map(e => {
        const lvl = e.level || 'INFO';
        return `<div class="log-row ${lvl}"><span class="badge ${'badge-'+lvl} me-2">${lvl}</span><span class="text-muted me-2">${e.ts}</span><strong>${e.name}</strong> — ${escHtml(e.message)}</div>`;
      }).join('');
    } catch(err) {
      body.innerHTML = `<div class="alert alert-danger m-3">Fout bij laden: ${err.message}</div>`;
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadLogs();
  setInterval(loadLogs, 15000);
</script>
</body>
</html>
